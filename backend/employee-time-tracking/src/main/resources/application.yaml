spring:
  application:
    name: EmployeeTimeTracking

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000

holidays:
  dates: