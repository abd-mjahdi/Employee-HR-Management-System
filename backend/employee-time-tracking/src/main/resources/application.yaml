spring:
  application:
    name: EmployeeTimeTracking

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: seed

holidays:
  dates:

logging:
  level:
    liquibase: info