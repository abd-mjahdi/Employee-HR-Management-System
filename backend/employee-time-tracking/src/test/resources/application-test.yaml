spring:
  main:
    banner-mode: "off"

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: seed

  jwt:
    secret: 0ef2d553cf17c6a144e82d71ca3d5d1f931f4b42d637a6d0b3ae645be2e1e67a
    expiration-ms: 3600000

logging:
  level:
    liquibase: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
